# ============================================================
# Бэкенд API: api.bloomai.ru
# ============================================================

server {
    listen 80;
    server_name api.bloomai.ru;

    # Для выпуска и продления сертификата Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное на HTTP перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.bloomai.ru;

    ssl_certificate     /etc/letsencrypt/live/api.bloomai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloomai.ru/privkey.pem;

    # Фото грузятся до 20 МБ (проверка в api/plants/router.py).
    # Дефолтный лимит nginx 1 МБ обрезал бы загрузку фото.
    client_max_body_size 25M;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Анализ фото через OpenAI бывает долгим, поднимаем таймаут.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ============================================================
# Дашборд: dashboard.bloomai.ru
# (basic auth внутри самого приложения, nginx только проксирует)
# ============================================================

server {
    listen 80;
    server_name dashboard.bloomai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name dashboard.bloomai.ru;

    # Один SAN-сертификат на оба домена хранится под именем первого домена.
    ssl_certificate     /etc/letsencrypt/live/api.bloomai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloomai.ru/privkey.pem;

    location / {
        proxy_pass http://dashboard:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
