# ============================================================
# Бэкенд API: api.bloomai.ru
# ============================================================

server {
    listen 80;
    server_name api.bloomai.ru;

    # Для выпуска и продления сертификата Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное на HTTP перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.bloomai.ru;

    ssl_certificate     /etc/letsencrypt/live/api.bloomai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloomai.ru/privkey.pem;

    # Фото грузятся до 20 МБ (проверка в api/plants/router.py).
    # Дефолтный лимит nginx 1 МБ обрезал бы загрузку фото.
    client_max_body_size 25M;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Анализ фото через OpenAI бывает долгим, поднимаем таймаут.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ============================================================
# Дашборд: dashboard.bloomai.ru
# (basic auth внутри самого приложения, nginx только проксирует)
# ============================================================

server {
    listen 80;
    server_name dashboard.bloomai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name dashboard.bloomai.ru;

    # Один SAN-сертификат на оба домена хранится под именем первого домена.
    ssl_certificate     /etc/letsencrypt/live/api.bloomai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloomai.ru/privkey.pem;

    location / {
        proxy_pass http://dashboard:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# Сайт приложения: bloomai.ru и www.bloomai.ru
# Статика из папки ./site репозитория (примонтирована в compose)
# ============================================================

server {
    listen 80;
    server_name bloomai.ru www.bloomai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://bloomai.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.bloomai.ru;

    ssl_certificate     /etc/letsencrypt/live/api.bloomai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloomai.ru/privkey.pem;

    # www сводим к основному домену, чтобы адрес был один
    return 301 https://bloomai.ru$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name bloomai.ru;

    ssl_certificate     /etc/letsencrypt/live/api.bloomai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloomai.ru/privkey.pem;

    root  /usr/share/nginx/site;
    index index.html;

    # index.html сайта это большой JS-бандл (~7.5 МБ), gzip сжимает его
    # в несколько раз и сильно ускоряет первую загрузку.
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }

    # Картинки и иконки можно кэшировать надолго
    location ~* \.(png|ico|svg|jpg|jpeg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
